services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: foodApp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: super
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./foodApp/src
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_SCHEMA: foodApp
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: super
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../../frontend/frontend/foodAppFrontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
